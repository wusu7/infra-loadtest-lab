global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "spring-boot-test-api"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["test-api:8080"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]
