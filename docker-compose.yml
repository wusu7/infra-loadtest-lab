services:
  redis:
    image: redis:7
    container_name: loadtest-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "no"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: loadtest-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: loadtest-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://172.31.37.123:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  test-api:
    build:
      context: ./test-api
    container_name: loadtest-api
    depends_on:
      - redis
      - kafka
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: loadtest-redis-exporter
    depends_on:
      - redis
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: loadtest-kafka-exporter
    depends_on:
      - kafka
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka:9092"

  prometheus:
    image: prom/prometheus:latest
    container_name: loadtest-prometheus
    depends_on:
      - test-api
      - redis-exporter
      - kafka-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
